<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机器学习课程重点整理 | 笔记</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #203042;
      background:
        radial-gradient(circle at top left, rgba(110, 174, 219, 0.24), transparent 28%),
        radial-gradient(circle at top right, rgba(149, 200, 198, 0.18), transparent 24%),
        linear-gradient(180deg, #fbfdff 0%, #eef6ff 42%, #e4f0fb 100%);
    }
    .page {
      width: min(calc(100% - 32px), 860px);
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    .card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(70, 103, 136, 0.12);
      backdrop-filter: blur(16px);
      padding: 34px;
    }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3rem); }
    .meta, p, li { color: #607387; line-height: 1.9; }
    .meta { margin-bottom: 22px; }
    ul { padding-left: 20px; }
    a {
      display: inline-flex;
      margin-top: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      color: #203042;
      text-decoration: none;
      font-weight: 600;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(240, 248, 255, 0.88));
      border: 1px solid rgba(75, 112, 146, 0.16);
    }
  </style>
</head>
<body>
  <div class="page">
    <article class="card">
      <h1>机器学习课程重点整理</h1>
      <div class="meta">课程笔记 · 示例页面</div>
      <p>这一页是放在 `notes/` 子目录下的单篇笔记示例。</p>
      <ul>
        <li>这里可以放章节标题和条目式总结。</li>
        <li>也可以整理公式、概念区别和易错点。</li>
        <li>如果以后笔记很多，`notes.html` 只保留目录和摘要即可。</li>
      </ul>
      <a href="../notes.html">返回笔记列表</a>
    </article>
  </div>
</body>
</html>
